<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Checklist</title>
<link rel="stylesheet" href="assets/style.css?v=9">
</head>
<body>
<div class="wrap">
  <p class="no-print all-checklists-link"><a href="index.html">&larr; All checklists</a></p>
  <h1 id="ticketTitle">Checklist</h1>
  <p class="subtitle no-print">Any tech on any PC can mark items complete here &mdash; changes save straight to the shared repo.</p>
  <p class="print-only" id="printMeta"></p>

  <div class="card no-print">
    <label class="field-label" for="techName">Agent</label>
    <select id="techName">
      <option value="">Select your name…</option>
    </select>
  </div>

  <div class="card no-print">
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-label" id="progressLabel">Loading…</span>
    </div>
  </div>

  <div class="card no-print" id="bulkBar" style="display:none;">
    <div class="actions-row">
      <span id="bulkBarLabel" style="font-size:0.85rem;color:var(--muted);"></span>
      <div style="display:flex; gap:8px;">
        <button class="secondary" id="bulkClearBtn" type="button">Clear selection</button>
        <button id="bulkCompleteBtn" type="button">Mark selected as completed</button>
      </div>
    </div>
  </div>

  <div class="card">
    <ul class="checklist" id="checklist"></ul>
    <div class="error-note" id="loadError"></div>
  </div>

  <div class="card no-print">
    <div class="actions-row">
      <span style="font-size:0.85rem;color:var(--muted);">Print or save a PDF copy of this checklist, complete or not.</span>
      <button class="secondary" id="printBtn" type="button">Print / Save as PDF</button>
    </div>
  </div>

  <div class="card no-print">
    <div class="actions-row">
      <span style="font-size:0.85rem;color:var(--muted);">Created this by mistake or need to remove a duplicate? Delete it permanently.</span>
      <button class="danger" id="deleteBtn" type="button">Delete Checklist</button>
    </div>
  </div>

  <p class="footnote no-print" id="statusNote"></p>
  <p class="no-print all-checklists-link"><a href="index.html">&larr; All checklists</a></p>
</div>

<script src="assets/github-store.js?v=3"></script>
<script src="assets/staff.js?v=2"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const ticket = PCStore.sanitizeTicket(params.get('ticket') || '');

  const techInput = document.getElementById('techName');
  STAFF_NAMES.forEach((name) => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    techInput.appendChild(opt);
  });

  const checklistEl = document.getElementById('checklist');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const printMeta = document.getElementById('printMeta');
  const statusNote = document.getElementById('statusNote');
  const loadError = document.getElementById('loadError');

  document.getElementById('ticketTitle').textContent = ticket ? `Checklist — ${ticket}` : 'Checklist';

  function formatTime(iso) {
    return iso ? new Date(iso).toLocaleString() : '';
  }

  function getLastAgent(data) {
    const completed = data.items.filter((i) => i.done && i.by && i.at);
    if (completed.length) {
      return completed.reduce((latest, item) => (item.at > latest.at ? item : latest)).by;
    }
    return data.createdBy || '';
  }

  const selectedItems = new Set();

  function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    const count = selectedItems.size;
    bar.style.display = count ? 'block' : 'none';
    document.getElementById('bulkBarLabel').textContent = `${count} item${count === 1 ? '' : 's'} selected`;
    document.getElementById('bulkCompleteBtn').textContent = `Mark ${count} Completed`;
  }

  function render(data) {
    checklistEl.innerHTML = '';

    Array.from(selectedItems).forEach((id) => {
      const item = data.items.find((i) => i.id === id);
      if (!item || item.done) selectedItems.delete(id);
    });

    const incompleteBySection = {};
    data.items.forEach((item) => {
      if (!item.done) (incompleteBySection[item.section] = incompleteBySection[item.section] || []).push(item.id);
    });

    let lastSection = null;
    data.items.forEach((item) => {
      if (item.section && item.section !== lastSection) {
        const header = document.createElement('div');
        header.className = 'group-header';
        const sectionIds = incompleteBySection[item.section] || [];
        if (sectionIds.length) {
          const sectionCb = document.createElement('input');
          sectionCb.type = 'checkbox';
          sectionCb.className = 'section-select-all';
          sectionCb.checked = sectionIds.every((id) => selectedItems.has(id));
          sectionCb.title = `Select all incomplete items in ${item.section}`;
          sectionCb.addEventListener('change', () => {
            sectionIds.forEach((id) => {
              if (sectionCb.checked) selectedItems.add(id); else selectedItems.delete(id);
            });
            document.querySelectorAll(`.item-select[data-section="${CSS.escape(item.section)}"]`).forEach((cb) => {
              cb.checked = sectionCb.checked;
            });
            updateBulkBar();
          });
          header.appendChild(sectionCb);
        }
        header.appendChild(document.createTextNode(item.section));
        checklistEl.appendChild(header);
        lastSection = item.section;
      }

      const li = document.createElement('li');
      li.className = 'item' + (item.done ? ' done' : '');

      if (!item.done) {
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'item-select';
        cb.dataset.section = item.section;
        cb.checked = selectedItems.has(item.id);
        cb.addEventListener('change', () => {
          if (cb.checked) selectedItems.add(item.id); else selectedItems.delete(item.id);
          updateBulkBar();
        });
        li.appendChild(cb);
      }

      const main = document.createElement('div');
      main.className = 'item-main';
      const title = document.createElement('div');
      title.className = 'item-text';
      title.textContent = item.title;
      main.appendChild(title);
      if (item.tag) {
        const tag = document.createElement('span');
        tag.className = 'item-tag';
        tag.textContent = item.tag;
        main.appendChild(tag);
      }
      if (item.steps && item.steps.length) {
        if (item.steps.length === 1) {
          const step = document.createElement('div');
          step.className = 'item-step';
          step.textContent = item.steps[0];
          main.appendChild(step);
        } else {
          const list = document.createElement('ol');
          list.className = 'item-steps';
          item.steps.forEach((s) => {
            const li2 = document.createElement('li');
            li2.textContent = s;
            list.appendChild(li2);
          });
          main.appendChild(list);
        }
      }
      if (item.links && item.links.length) {
        const linksRow = document.createElement('div');
        linksRow.className = 'item-links';
        item.links.forEach((link) => {
          const a = document.createElement('a');
          a.href = link.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.textContent = link.label;
          linksRow.appendChild(a);
        });
        main.appendChild(linksRow);
      }
      const meta = document.createElement('div');
      meta.className = 'item-meta';
      meta.textContent = item.done ? `Completed by ${item.by} on ${formatTime(item.at)}` : '';
      main.appendChild(meta);
      li.appendChild(main);

      const btn = document.createElement('button');
      if (item.done) {
        btn.textContent = 'Undo';
        btn.className = 'secondary';
        btn.addEventListener('click', () => unmarkCompleted(item.id));
      } else {
        btn.textContent = 'Mark completed';
        btn.addEventListener('click', () => markCompleted(item.id));
      }
      li.appendChild(btn);

      checklistEl.appendChild(li);
    });

    const doneCount = data.items.filter((i) => i.done).length;
    const total = data.items.length;
    progressFill.style.width = `${(doneCount / total) * 100}%`;
    progressLabel.textContent = `${doneCount} / ${total} completed`;

    printMeta.textContent = `Ticket ${ticket} — ${new Date().toLocaleDateString()} — ${doneCount}/${total} items complete`;
    updateBulkBar();

    return { doneCount, total };
  }

  async function loadAndRender() {
    if (!ticket) {
      loadError.textContent = 'No ticket specified. Go back and start a checklist from the dashboard.';
      return null;
    }
    statusNote.textContent = 'Loading…';
    try {
      const data = await PCStore.loadChecklist(ticket);
      if (!data) {
        loadError.textContent = `No checklist found for "${ticket}". Go back and start it from the dashboard.`;
        return null;
      }
      loadError.textContent = '';
      const counts = render(data);
      if (!techInput.value) {
        const lastAgent = getLastAgent(data);
        if (lastAgent && Array.from(techInput.options).some((o) => o.value === lastAgent)) {
          techInput.value = lastAgent;
        }
      }
      statusNote.textContent = `Last refreshed ${new Date().toLocaleString()}.`;
      return counts;
    } catch (e) {
      loadError.textContent = `Could not load checklist: ${e.message}`;
      return null;
    }
  }

  async function completeItems(ids) {
    const tech = techInput.value.trim();
    if (!tech) {
      alert('Enter your name before marking items completed.');
      techInput.focus();
      return;
    }
    if (!PCStore.getToken()) {
      alert('Add a GitHub token on the dashboard (Settings) before saving changes.');
      return;
    }
    if (!ids.length) return;
    statusNote.textContent = 'Saving…';
    const now = new Date().toISOString();
    try {
      const saved = await PCStore.saveChecklist(
        ticket,
        (data) => ({
          ...data,
          items: data.items.map((i) => (ids.includes(i.id) ? { ...i, done: true, by: tech, at: now } : i)),
        }),
        ids.length > 1 ? `Mark ${ids.length} items complete on ${ticket}` : `Mark item ${ids[0]} complete on ${ticket}`
      );
      ids.forEach((id) => selectedItems.delete(id));
      const counts = render(saved);
      await PCStore.upsertIndexEntry({
        ticket,
        updatedAt: now,
        doneCount: counts.doneCount,
        totalCount: counts.total,
        status: counts.doneCount === counts.total ? 'completed' : 'in_progress',
      });
      statusNote.textContent = `Saved. Last refreshed ${new Date().toLocaleString()}.`;
    } catch (e) {
      statusNote.textContent = `Could not save: ${e.message}`;
      await loadAndRender();
    }
  }

  async function markCompleted(itemId) {
    const ids = selectedItems.has(itemId) && selectedItems.size > 1 ? Array.from(selectedItems) : [itemId];
    await completeItems(ids);
  }

  async function unmarkCompleted(itemId) {
    if (!PCStore.getToken()) {
      alert('Add a GitHub token on the dashboard (Settings) before saving changes.');
      return;
    }
    if (!confirm('Undo this item and mark it not completed?')) return;
    statusNote.textContent = 'Saving…';
    try {
      const saved = await PCStore.saveChecklist(
        ticket,
        (data) => ({
          ...data,
          items: data.items.map((i) => (i.id === itemId ? { ...i, done: false, by: null, at: null } : i)),
        }),
        `Undo item ${itemId} on ${ticket}`
      );
      const counts = render(saved);
      await PCStore.upsertIndexEntry({
        ticket,
        updatedAt: new Date().toISOString(),
        doneCount: counts.doneCount,
        totalCount: counts.total,
        status: counts.doneCount === counts.total ? 'completed' : 'in_progress',
      });
      statusNote.textContent = `Saved. Last refreshed ${new Date().toLocaleString()}.`;
    } catch (e) {
      statusNote.textContent = `Could not save: ${e.message}`;
      await loadAndRender();
    }
  }

  document.getElementById('bulkClearBtn').addEventListener('click', () => {
    selectedItems.clear();
    document.querySelectorAll('.item-select, .section-select-all').forEach((cb) => { cb.checked = false; });
    updateBulkBar();
  });

  document.getElementById('bulkCompleteBtn').addEventListener('click', async () => {
    await completeItems(Array.from(selectedItems));
  });

  document.getElementById('printBtn').addEventListener('click', () => {
    window.print();
  });

  document.getElementById('deleteBtn').addEventListener('click', async () => {
    if (!ticket) return;
    if (!PCStore.getToken()) {
      alert('Add a GitHub token on the dashboard (Settings) before deleting a checklist.');
      return;
    }
    if (!confirm(`Permanently delete checklist "${ticket}"? This cannot be undone.`)) return;
    statusNote.textContent = 'Deleting…';
    try {
      await PCStore.deleteChecklist(ticket, `Delete checklist ${ticket}`);
      await PCStore.removeIndexEntry(ticket, `Remove ${ticket} from index`);
      window.location.href = 'index.html';
    } catch (e) {
      statusNote.textContent = `Could not delete: ${e.message}`;
    }
  });

  loadAndRender();
</script>
</body>
</html>
